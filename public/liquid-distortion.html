<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Liquid Distortion</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: none; /* Hide default cursor */
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Custom Cursor Follower */
        #cursor {
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="cursor">VIEW</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // ==========================================================
    // VARIABLES FOR TWEAKING
    // ==========================================================
    const DISTORTION_STRENGTH = 0.035; // How much the pixels bend (viscosity)
    const RIPPLE_RADIUS = 0.12;        // Size of the distortion area
    const FADE_SPEED = 0.015;          // How fast the trail fades (higher = faster)
    const TRAIL_LENGTH = 50;           // Number of points in the trail
    // ==========================================================

    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Load Texture
    const textureLoader = new THREE.TextureLoader();
    const imageUrl = 'https://images.unsplash.com/photo-1600210492493-0946911123ea?fm=jpg&w=1920&q=80';
    
    let imageTexture;
    let material;

    // Trail data array (x, y, age)
    const trailData = new Float32Array(TRAIL_LENGTH * 3);

    const vertexShader = `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    `;

    const fragmentShader = `
        uniform sampler2D uTexture;
        uniform vec2 uResolution;
        uniform vec2 uImageResolution;
        uniform vec3 uTrail[${TRAIL_LENGTH}];
        uniform float uDistortionStrength;
        uniform float uRippleRadius;
        
        varying vec2 vUv;

        void main() {
            // Background cover sizing (maintains aspect ratio)
            vec2 ratio = vec2(
                min((uResolution.x / uResolution.y) / (uImageResolution.x / uImageResolution.y), 1.0),
                min((uResolution.y / uResolution.x) / (uImageResolution.y / uImageResolution.x), 1.0)
            );
            vec2 uv = vec2(
                vUv.x * ratio.x + (1.0 - ratio.x) * 0.5,
                vUv.y * ratio.y + (1.0 - ratio.y) * 0.5
            );

            vec2 distortion = vec2(0.0);

            for(int i = 0; i < ${TRAIL_LENGTH}; i++) {
                vec3 point = uTrail[i];
                float age = point.z;
                
                if (age > 0.0 && age < 1.0) {
                    vec2 pos = point.xy;
                    
                    // Correct aspect ratio for distance calculation
                    vec2 uvCorrected = vUv * uResolution;
                    vec2 posCorrected = pos * uResolution;
                    
                    float dist = distance(uvCorrected, posCorrected) / max(uResolution.x, uResolution.y);
                    
                    if (dist < uRippleRadius) {
                        // Calculate displacement direction
                        vec2 dir = normalize(vUv - pos);
                        
                        // Smooth falloff based on distance
                        float falloff = smoothstep(uRippleRadius, 0.0, dist);
                        
                        // Fade out based on age
                        float ageFade = smoothstep(1.0, 0.0, age);
                        
                        // Accumulate distortion
                        distortion += dir * falloff * ageFade * uDistortionStrength;
                    }
                }
            }

            // Apply distortion to UV coordinates
            vec4 color = texture2D(uTexture, uv - distortion);
            gl_FragColor = color;
        }
    `;

    textureLoader.load(imageUrl, (texture) => {
        imageTexture = texture;
        
        material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTexture: { value: texture },
                uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                uImageResolution: { value: new THREE.Vector2(texture.image.width, texture.image.height) },
                uTrail: { value: trailData },
                uDistortionStrength: { value: DISTORTION_STRENGTH },
                uRippleRadius: { value: RIPPLE_RADIUS }
            }
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
    });

    // Mouse interaction
    let mouse = new THREE.Vector2(0.5, 0.5);
    let targetMouse = new THREE.Vector2(0.5, 0.5);
    let currentTrailIndex = 0;

    window.addEventListener('mousemove', (e) => {
        targetMouse.x = e.clientX / window.innerWidth;
        targetMouse.y = 1.0 - (e.clientY / window.innerHeight);
    });

    // Touch support
    window.addEventListener('touchmove', (e) => {
        if(e.touches.length > 0) {
            targetMouse.x = e.touches[0].clientX / window.innerWidth;
            targetMouse.y = 1.0 - (e.touches[0].clientY / window.innerHeight);
        }
    });

    // Cursor Follower (Inertia)
    const cursor = document.getElementById('cursor');
    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;

    // Resize handler
    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        if (material) {
            material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
        }
    });

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);

        // Update trail ages
        for(let i = 0; i < TRAIL_LENGTH; i++) {
            if (trailData[i * 3 + 2] > 0.0) {
                trailData[i * 3 + 2] += FADE_SPEED;
                if (trailData[i * 3 + 2] >= 1.0) {
                    trailData[i * 3 + 2] = 0.0; // Dead
                }
            }
        }

        // Add new point to trail if mouse moved
        const dist = mouse.distanceTo(targetMouse);
        if (dist > 0.001) {
            // Lerp mouse for smoother trail generation
            mouse.lerp(targetMouse, 0.3);
            
            trailData[currentTrailIndex * 3] = mouse.x;
            trailData[currentTrailIndex * 3 + 1] = mouse.y;
            trailData[currentTrailIndex * 3 + 2] = 0.01; // Just born
            
            currentTrailIndex = (currentTrailIndex + 1) % TRAIL_LENGTH;
        }

        if (material) {
            material.uniforms.uTrail.value = trailData;
        }

        // Update custom cursor with inertia
        cursorX += (targetMouse.x * window.innerWidth - cursorX) * 0.12;
        cursorY += ((1.0 - targetMouse.y) * window.innerHeight - cursorY) * 0.12;
        
        cursor.style.left = cursorX + 'px';
        cursor.style.top = cursorY + 'px';

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
